# Declarative Cloud Run service definition — Google Cloud deployment.
#
# Project:  boston-rerouting
# Region:   us-central1
# Image:    Artifact Registry → boston-risk repo
#
# Secrets (google-maps-api-key, google-server-api-key, openweather-api-key) are
# fetched at runtime by the app via the Secret Manager SDK (src/secrets.py).
# No env-var injection is used.
#
# One-time prerequisites (already done for this project):
#   - Artifact Registry repo "boston-risk" created in us-central1
#   - Three API secrets + cloudsql-postgres-password created in Secret Manager
#   - Service account 294613088058-compute@developer.gserviceaccount.com
#     granted roles/secretmanager.secretAccessor on all four secrets
#     and roles/cloudsql.client on the project
#   - Cloud SQL instance: boston-rerouting:us-central1:boston-risk-postgres
#
# Deploy:
#   gcloud run services replace cloud-run-service.yaml --region=us-central1

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: boston-accident-risk-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # gen2 execution environment — better cold-start and memory performance
        run.googleapis.com/execution-environment: gen2
        # Scale to 0 when idle (cost-free). Raise minScale to "1" to eliminate cold starts.
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        # Authorise TCP connections to Cloud SQL and pre-validate IAM permissions.
        run.googleapis.com/cloudsql-instances: boston-rerouting:us-central1:boston-risk-postgres
    spec:
      # Allow up to 60 concurrent requests per instance (model is thread-safe after load)
      containerConcurrency: 60
      # Generous timeout — BallTree + LightGBM load takes ~15s on cold start
      timeoutSeconds: 300
      containers:
        - image: us-central1-docker.pkg.dev/boston-rerouting/boston-risk/boston-accident-risk-api:latest
          ports:
            - containerPort: 8080
          env:
            # Phase B3: Vertex AI inference path.
            # Set VERTEX_ENDPOINT_ID to the full resource name from champion_manifest.json
            # (e.g. projects/boston-rerouting/locations/us-central1/endpoints/NNNN).
            # Leave empty ("") to keep all inference on the local model (safe default).
            - name: VERTEX_ENDPOINT_ID
              value: "projects/294613088058/locations/us-central1/endpoints/1226299062353920000"
            - name: VERTEX_TIMEOUT_SECONDS
              value: "10.0"
            - name: VERTEX_BATCH_TIMEOUT_SECONDS
              value: "20.0"
            - name: VERTEX_PROJECT
              value: "boston-rerouting"
            - name: VERTEX_LOCATION
              value: "us-central1"
            # Gemini explanation layer — key stored in Secret Manager.
            # Application restriction: None. API restriction: Generative Language API only.
            - name: ENABLE_GEMINI_EXPLANATIONS
              value: "true"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  key: latest
          resources:
            limits:
              cpu: "1"
              # 2 Gi covers: LightGBM model + spatial parquet BallTree + pandas + request headroom
              memory: 2Gi
  traffic:
    - percent: 100
      latestRevision: true
